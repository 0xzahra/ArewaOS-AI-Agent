app = "arewaos-agent"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "requests"
  soft_limit = 50
  hard_limit = 100

[[http_service.checks]]
  interval = "30s"
  grace_period = "5s"
  method = "get"
  path = "/health"
  timeout = "10s"

[env]
  NODE_ENV = "production"
